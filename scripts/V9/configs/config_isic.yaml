

data_paths:
  input_image_dir: "E:/Datasets/ISIC2018/test/images_compressed"
  output_mask_dir: "E:/Datasets/ISIC2018/test/results"
  ground_truth_mask_dir: "E:/Datasets/ISIC2018/test/groundtruth"
  metrics_output_file: "E:/PythonD/ERA/scripts/V9/outputs/metrics.txt"
  output_dir: "E:/PythonD/ERA/scripts/V9/outputs"     #运行结果
  log_file: "E:/PythonD/ERA/scripts/V9/outputs/logs/main_process.log"     #日志
  knowledge_base_json: "E:/PythonD/ERA/scripts/V9/scripts/unified_medical_kb.json"
  feature_matrix_path: "E:/PythonD/ERA/scripts/V9/scripts/outputs_medical/medical_features.npz"
   #knowledge_base_json 和 feature_matrix_path：这两项指向 RAG（检索增强）的知识库。如果你还没运行构建知识库的脚本，需要先指定好未来生成的 json 和 npz 文件存放位置。
evaluation_configs:
  enable_visualization: false
  visualization_sample_ratio: 0.1
  results_filename: "results_medical_bruteforce_search.json"

model_configs:
  encoder: "blip_feature_extractor"
  encoder_model_type: "base"
  reasoning_engine:
    model_path: "E:/PythonD/ERA/Qwen/Qwen2.5-VL-7B-Instruct"

    use_int8: True
    use_flash_attention_2: false

    # === 新增：三支决策核心阈值 ===
    alpha: 0.7  # 强置信度阈值。Score >= 0.7 判定为 Accept (正域)
    beta: 0.3   # 弱置信度阈值。Score < 0.3 判定为 Reject (负域)
    # 介于 0.3 和 0.7 之间的判定为 Defer (边界域)

  sam2:
    root_dir: "E:/PythonD/ERA/sam2_weights"
    checkpoint: "E:/PythonD/ERA/sam2_weights/sam2.1_hiera_base_plus.pt"
    model_cfg: "E:/PythonD/ERA/sam2_weights/config.yaml"

faiss_configs:
  feature_dim: 256

retrieval_configs:
  image_text_weight: 1
  size_similarity_weight: 0.1
  top_k: 6

logic_thresholds:
  tier1_direct_mapping_similarity: 0.95
  tier2_fallback_similarity: 0.85
  box_expansion_ratio: 1.0

# === 新增：边界域处理参数 ===
  defer_strategy: "conservative"  # 策略：保守模式
  boundary_expansion: 1.1         # 针对 Defer 状态的框，可以稍微放大 10% 以防漏检